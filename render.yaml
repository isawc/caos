services:
  - type: web
    name: caos-lista
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CAOS_DATA_FILE
        value: /opt/render/project/src/storage/data.json
    disk:
      name: caos-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
